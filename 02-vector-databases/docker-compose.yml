services:
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: local_qdrant_vector_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  ollama_service:
    image: ollama/ollama:latest
    container_name: containerized_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
    environment:
      - OLLAMA_EMBEDDINGS=1
    restart: always
